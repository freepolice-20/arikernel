name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - run: pnpm lint

      - name: Check for legacy server references in docs
        run: bash scripts/check-legacy-refs.sh

      # Smoke test: verify packages work when installed from pack
      - name: Package smoke test
        run: |
          mkdir /tmp/smoke && cd /tmp/smoke
          npm init -y
          # Set ESM mode since @arikernel packages are ESM-only
          node -e "const p=require('./package.json'); p.type='module'; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2))"
          # Pack and install core
          cd $GITHUB_WORKSPACE/packages/core && npm pack --pack-destination /tmp/smoke
          cd /tmp/smoke && npm install ./arikernel-core-*.tgz
          # Verify core: presets load, generateId works, schema validation available
          node --input-type=module -e "
            import { PRESETS, getPreset, generateId } from '@arikernel/core';
            const presetCount = Object.keys(PRESETS).length;
            console.log('Presets:', presetCount);
            if (presetCount < 7) { console.error('Expected >= 7 presets'); process.exit(1); }
            const safe = getPreset('safe');
            if (!safe.capabilities?.length) { console.error('safe preset missing capabilities'); process.exit(1); }
            const id = generateId();
            if (!id) { console.error('generateId() failed'); process.exit(1); }
            console.log('Core smoke test passed');
          "

  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python runtime and test deps
        run: pip install -e "python/[dev,server]"

      - name: Run Python tests
        # test_integration.py requires the TypeScript sidecar (packages/sidecar) to be
        # built and running. It is tested in the python-sidecar job below.
        run: cd python && python -m pytest tests/ -v --ignore=tests/test_integration.py

      - name: Verify packaging integrity
        run: |
          pip install python/
          python -c "
          from arikernel.runtime.spec_loader import load_spec
          spec = load_spec()
          assert 'presets' in spec, 'spec missing presets'
          assert 'defaults' in spec, 'spec missing defaults'
          print('Packaging integrity check passed')
          "

      - name: Verify sidecar-authoritative architecture
        run: |
          python -c "
          # Verify create_kernel() defaults to sidecar mode
          try:
              from arikernel import create_kernel
              kernel = create_kernel(preset='safe-research')
              print('ERROR: should have raised ConnectionError (no sidecar running)')
              exit(1)
          except ConnectionError as e:
              assert 'sidecar' in str(e).lower(), f'Error should mention sidecar: {e}'
              print('OK: create_kernel() defaults to sidecar mode')

          # Verify local mode requires explicit opt-in
          import warnings
          with warnings.catch_warnings(record=True) as w:
              warnings.simplefilter('always')
              kernel = create_kernel(preset='safe-research', mode='local')
              kernel.close()
              local_warns = [x for x in w if 'local enforcement' in str(x.message).lower()]
              assert len(local_warns) >= 1, 'Local mode should emit warning'
              print('OK: local mode emits dev/testing warning')

          # Verify SidecarKernel has correct interface
          from arikernel.sidecar import SidecarKernel
          for method in ['request_capability', 'execute_tool', 'close', 'health']:
              assert hasattr(SidecarKernel, method), f'SidecarKernel missing {method}'
          print('OK: SidecarKernel interface complete')
          print('Sidecar architecture verification passed')
          "

      - name: Smoke-check Python examples (py_compile)
        run: |
          for f in examples/*.py; do
            echo "Compiling $f..."
            python -m py_compile "$f"
          done
          echo "All Python examples compile OK"

  # Integration test: Python + TypeScript sidecar
  python-sidecar:
    runs-on: ubuntu-latest
    needs: [typescript]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Install Python runtime
        run: pip install -e "python/[dev,server]"

      - name: Start TypeScript sidecar (port 8787)
        run: |
          node -e "
            import('@arikernel/sidecar').then(m => {
              const server = m.createSidecarServer({ devMode: true });
              server.listen().then(() => console.log('Sidecar listening on port 8787'));
            });
          " &
          # Wait for sidecar to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8787/health > /dev/null 2>&1; then
              echo "Sidecar is ready"
              break
            fi
            sleep 1
          done

      - name: Run Python sidecar integration tests
        run: cd python && python -m pytest tests/test_integration.py tests/test_sidecar_semantics.py -v
